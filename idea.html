<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Group Idea Board</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0ebe3;
      --surface: #fff8f0;
      --card: #ffffff;
      --accent: #e85d26;
      --accent2: #2d6be4;
      --text: #1a1612;
      --muted: #8a7f75;
      --border: #e0d8ce;
      --radius: 14px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: var(--text);
    }

    /* ── HEADER ── */
    header {
      background: var(--text);
      color: #fff;
      padding: 18px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.3rem;
      letter-spacing: -0.5px;
    }
    .logo-icon {
      width: 34px; height: 34px;
      background: var(--accent);
      border-radius: 8px;
      display: grid; place-items: center;
      font-size: 1.1rem;
    }
    .header-tag {
      font-size: 0.75rem;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 4px 12px;
      border-radius: 99px;
      letter-spacing: 0.5px;
    }

    /* ── HERO ── */
    .hero {
      background: linear-gradient(135deg, #1a1612 0%, #2d1f14 50%, #1a1612 100%);
      padding: 48px 40px 56px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 80% at 50% 120%, rgba(232,93,38,0.25) 0%, transparent 70%);
    }
    .hero h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      color: #fff;
      position: relative;
      letter-spacing: -1px;
      line-height: 1.1;
    }
    .hero h1 span { color: var(--accent); }
    .hero p {
      margin-top: 12px;
      color: rgba(255,255,255,0.55);
      font-size: 1rem;
      position: relative;
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
      padding: 40px 24px;
    }

    /* ── INPUT CARD ── */
    .input-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      margin-bottom: 32px;
      animation: slideDown 0.4s ease;
    }
    .input-card h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 18px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .input-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    select, input[type="text"] {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    select:focus, input[type="text"]:focus {
      border-color: var(--accent2);
      box-shadow: 0 0 0 3px rgba(45,107,228,0.12);
    }
    select { min-width: 170px; cursor: pointer; }
    input[type="text"] { flex: 1; min-width: 200px; }
    button#addBtn {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.3px;
      padding: 12px 24px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    button#addBtn:hover { background: #cf4d1a; }
    button#addBtn:active { transform: scale(0.97); }

    /* ── STATS BAR ── */
    .stats-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .stat-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 8px 16px;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .stat-chip .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }
    .dot-orange { background: var(--accent); }
    .dot-blue { background: var(--accent2); }
    #ideaCount {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
    }

    /* ── IDEAS LIST ── */
    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .list-header h2 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.25rem;
    }
    button#clearBtn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 6px 14px;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    button#clearBtn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    #ideasList {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .idea-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      animation: fadeIn 0.3s ease;
      transition: box-shadow 0.2s;
    }
    .idea-item:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); }

    .idea-number {
      width: 28px; height: 28px;
      min-width: 28px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      display: grid; place-items: center;
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
    }

    .idea-content { flex: 1; }
    .idea-text {
      font-size: 0.95rem;
      font-weight: 500;
      line-height: 1.4;
    }
    .idea-meta {
      margin-top: 4px;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .idea-meta strong {
      color: var(--accent2);
      font-weight: 600;
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--border);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
    }
    .delete-btn:hover { color: var(--accent); background: #fff0ec; }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
    }
    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.95rem; }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: #fff;
      padding: 12px 22px;
      border-radius: 99px;
      font-size: 0.88rem;
      font-weight: 500;
      transition: transform 0.3s ease;
      z-index: 999;
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── FOOTER ── */
    footer {
      background: var(--text);
      color: rgba(255,255,255,0.4);
      text-align: center;
      padding: 20px;
      font-size: 0.8rem;
    }
    footer strong { color: rgba(255,255,255,0.7); }

    /* ── ANIMATIONS ── */
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 540px) {
      header { padding: 14px 20px; }
      .hero { padding: 36px 20px 44px; }
      main { padding: 28px 16px; }
      .input-row { flex-direction: column; }
      select, input[type="text"], button#addBtn { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">💡</div>
      IdeaBoard
    </div>
    <span class="header-tag">Day 03 Project</span>
  </header>

  <!-- HERO -->
  <div class="hero">
    <h1>Group <span>Idea</span> Board</h1>
    <p>Share your ideas with the team — every idea counts.</p>
  </div>

  <!-- MAIN -->
  <main>

    <!-- Input Card -->
    <div class="input-card">
      <h2>Submit an Idea</h2>
      <div class="input-row">
        <select id="nameSelect">
          <option value="" disabled selected>Select your name…</option>
          <option>Viruna</option>
          <option>Imesh</option>
          <option>Punsara</option>
          <option>Chirana</option>
          <option>Chamika</option>
          <option>Izzath</option>
          <option>Virangi</option>
          <option>Shanthiyasha</option>
        </select>
        <input type="text" id="ideaInput" placeholder="Enter your idea here…" maxlength="120"/>
        <button id="addBtn">+ Add Idea</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat-chip">
        <span class="dot dot-orange"></span>
        <span><span id="ideaCount">0</span> ideas submitted</span>
      </div>
      <div class="stat-chip">
        <span class="dot dot-blue"></span>
        <span id="contributorCount">0 contributors</span>
      </div>
    </div>

    <!-- Ideas List -->
    <div class="list-header">
      <h2>All Ideas</h2>
      <button id="clearBtn">Clear All</button>
    </div>

    <ul id="ideasList">
      <li class="empty-state">
        <div class="empty-icon">🗒️</div>
        <p>No ideas yet. Be the first to share one!</p>
      </li>
    </ul>

  </main>

  <!-- FOOTER -->
  <footer>
    Built by <strong>your team</strong> · Day 03 Workshop · Group Idea Board
  </footer>

  <!-- TOAST -->
  <div id="toast"></div>

  <script>
    const ideas = [];

    const nameSelect = document.getElementById('nameSelect');
    const ideaInput  = document.getElementById('ideaInput');
    const addBtn     = document.getElementById('addBtn');
    const clearBtn   = document.getElementById('clearBtn');
    const ideasList  = document.getElementById('ideasList');
    const ideaCount  = document.getElementById('ideaCount');
    const contribCount = document.getElementById('contributorCount');
    const toast      = document.getElementById('toast');

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function updateStats() {
      ideaCount.textContent = ideas.length;
      const unique = new Set(ideas.map(i => i.name)).size;
      contribCount.textContent = unique + (unique === 1 ? ' contributor' : ' contributors');
    }

    function render() {
      ideasList.innerHTML = '';
      if (ideas.length === 0) {
        ideasList.innerHTML = `
          <li class="empty-state">
            <div class="empty-icon">🗒️</div>
            <p>No ideas yet. Be the first to share one!</p>
          </li>`;
        return;
      }
      ideas.forEach((idea, idx) => {
        const li = document.createElement('li');
        li.className = 'idea-item';
        li.innerHTML = `
          <div class="idea-number">${idx + 1}</div>
          <div class="idea-content">
            <div class="idea-text">${escHtml(idea.text)}</div>
            <div class="idea-meta">suggested by <strong>${escHtml(idea.name)}</strong> · ${idea.time}</div>
          </div>
          <button class="delete-btn" title="Remove" onclick="removeIdea(${idx})">✕</button>`;
        ideasList.appendChild(li);
      });
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function removeIdea(idx) {
      ideas.splice(idx, 1);
      render();
      updateStats();
      showToast('Idea removed.');
    }

    addBtn.addEventListener('click', () => {
      const name = nameSelect.value;
      const text = ideaInput.value.trim();
      if (!name) { showToast('⚠️ Please select your name first!'); return; }
      if (!text)  { showToast('⚠️ Please enter an idea!'); return; }

      const now = new Date();
      const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      ideas.push({ name, text, time });

      ideaInput.value = '';
      ideaInput.focus();
      render();
      updateStats();
      showToast('✅ Idea added!');
    });

    ideaInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') addBtn.click();
    });

    clearBtn.addEventListener('click', () => {
      if (ideas.length === 0) return;
      if (confirm('Clear all ideas? This cannot be undone.')) {
        ideas.length = 0;
        render();
        updateStats();
        showToast('Board cleared.');
      }
    });
  </script>
</body>
</html>
