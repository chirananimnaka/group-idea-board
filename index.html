<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Toolkit</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0ebe3;
      --surface: #fff8f0;
      --card: #ffffff;
      --accent: #e85d26;
      --accent2: #2d6be4;
      --text: #1a1612;
      --muted: #8a7f75;
      --border: #e0d8ce;
      --radius: 14px;
    }

    body.dark-mode {
      --bg: #1a1612;
      --surface: #2d2420;
      --card: #3a332a;
      --text: #f0ebe3;
      --muted: #a9a39a;
      --border: #4a423a;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: var(--text);
    }

    /* ── HEADER & NAV ── */
    header {
      background: var(--text);
      color: #fff;
      padding: 18px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.3rem;
    }
    .logo-icon {
      width: 34px; height: 34px;
      background: var(--accent);
      border-radius: 8px;
      display: grid; place-items: center;
    }

    .nav-bar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .nav-tabs { display: flex; }
    .nav-tab {
      padding: 16px 24px;
      background: transparent;
      border: none;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: 0.2s;
    }
    .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── DARK MODE TOGGLE ── */
    .dark-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .toggle-switch {
      width: 40px; height: 22px; background: var(--muted);
      border-radius: 11px; position: relative; border: none; cursor: pointer;
    }
    .toggle-switch.active { background: var(--accent); }
    .toggle-dot {
      width: 18px; height: 18px; background: #fff; border-radius: 50%;
      position: absolute; top: 2px; left: 2px; transition: 0.3s;
    }
    .toggle-switch.active .toggle-dot { left: 20px; }

    /* ── MAIN LAYOUT ── */
    main {
      flex: 1; display: flex; max-width: 1200px; width: 100%;
      margin: 0 auto; padding: 40px 24px; gap: 32px;
    }
    .main-content { flex: 1; min-width: 0; }
    .sidebar {
      width: 300px; background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px; height: fit-content;
    }

    .tab-content { display: none; animation: fadeIn 0.3s ease; }
    .tab-content.active { display: block; }

    /* ── CARDS & INPUTS ── */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06); margin-bottom: 32px;
    }
    .card h2 { font-family: 'Syne', sans-serif; font-size: 1rem; margin-bottom: 18px; color: var(--muted); text-transform: uppercase; }
    
    .input-row { display: flex; gap: 10px; flex-wrap: wrap; }
    input, select {
      padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 10px;
      background: var(--surface); color: var(--text); outline: none; flex: 1;
    }
    button {
      font-family: 'Syne', sans-serif; font-weight: 700; padding: 12px 24px;
      background: var(--accent); color: #fff; border: none; border-radius: 10px; cursor: pointer;
    }

    /* ── STATS BAR ── */
    .stats-bar { display: flex; gap: 15px; margin-bottom: 20px; }
    .stat-chip { background: var(--surface); padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; border: 1px solid var(--border); }

    /* ── LISTS ── */
    .item-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .list-item {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px; display: flex; align-items: center; justify-content: space-between;
    }
    .delete-btn { background: none; color: var(--muted); cursor: pointer; border: none; font-size: 1.2rem; }
    .delete-btn:hover { color: var(--accent); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }

    #toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #333; color: white; padding: 12px 24px; border-radius: 30px;
      opacity: 0; transition: 0.3s; pointer-events: none; z-index: 1000;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

  <header>
    <div class="logo"><div class="logo-icon">🎓</div> Student Toolkit</div>
  </header>

  <nav class="nav-bar">
    <div class="nav-tabs">
      <button class="nav-tab active" data-tab="ideas">💡 Group Idea Board</button>
      <button class="nav-tab" data-tab="gpa">🧮 GPA Calculator</button>
      <button class="nav-tab" data-tab="timer">⏱️ Study Timer</button>
    </div>
    <div class="dark-toggle">
      <span>Dark Mode</span>
      <button class="toggle-switch" id="darkModeBtn"><div class="toggle-dot"></div></button>
    </div>
  </nav>

  <main>
    <div class="main-content">
      
      <div id="ideas-tab" class="tab-content active">
        <div class="card">
          <h2>Submit a Group Idea</h2>
          <div class="input-row">
            <select id="nameSelect">
              <option value="" disabled selected>Select your name...</option>
              <option>Viruna</option><option>Imesh</option><option>Punsara</option>
              <option>Chirana</option><option>Chamika</option><option>Izzath</option>
            </select>
            <input type="text" id="ideaInput" placeholder="Enter your idea here..." maxlength="120"/>
            <button id="addIdeaBtn">+ Add Idea</button>
          </div>
        </div>

        <div class="stats-bar">
          <div class="stat-chip">🟠 <span id="ideaCount">0</span> ideas submitted</div>
          <div class="stat-chip">🔵 <span id="contribCount">0</span> contributors</div>
        </div>

        <ul id="ideasList" class="item-list"></ul>
      </div>

      <div id="gpa-tab" class="tab-content">
        <div class="card">
          <h2>GPA Calculator</h2>
          <div class="input-row">
            <input type="text" id="courseName" placeholder="Course Name"/>
            <select id="courseGrade">
                <option value="4.0">A (4.0)</option><option value="3.0">B (3.0)</option><option value="2.0">C (2.0)</option>
            </select>
            <input type="number" id="courseCredits" placeholder="Credits" min="1"/>
            <button id="addCourseBtn">Add</button>
          </div>
        </div>
        <div class="card" style="text-align: center;">
            <h3>Overall GPA: <span id="gpaDisplay" style="color:var(--accent); font-size: 2rem;">0.00</span></h3>
        </div>
        <ul id="coursesList" class="item-list"></ul>
      </div>

      <div id="timer-tab" class="tab-content">
        <div class="card" style="text-align: center;">
          <h2>⏱️ Study Timer</h2>
          <div id="timerDisplay" style="font-size: 4rem; font-weight: 800; color: var(--accent); margin: 20px 0;">25:00</div>
          <div class="input-row" style="justify-content: center;">
            <button id="startTimerBtn">Start</button>
            <button id="resetTimerBtn" style="background: var(--accent2);">Reset</button>
          </div>
        </div>
      </div>

    </div>

    <aside class="sidebar">
      <h3>📅 Events</h3>
      <div class="input-row" style="margin-top: 10px;">
        <input type="text" id="eventText" placeholder="Event..."/>
        <button id="addEventBtn">+</button>
      </div>
      <ul id="eventsList" class="item-list" style="margin-top: 15px;"></ul>
    </aside>
  </main>

  <div id="toast"></div>

  <script>
    // --- TAB SYSTEM ---
    document.querySelectorAll('.nav-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.nav-tab, .tab-content').forEach(el => el.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + '-tab').classList.add('active');
      });
    });

    // --- DARK MODE ---
    const darkModeBtn = document.getElementById('darkModeBtn');
    darkModeBtn.onclick = () => {
      document.body.classList.toggle('dark-mode');
      darkModeBtn.classList.toggle('active');
    };

    function showToast(m) {
      const t = document.getElementById('toast');
      t.textContent = m; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    // --- IDEA BOARD LOGIC ---
    const ideas = [];
    document.getElementById('addIdeaBtn').onclick = () => {
      const name = document.getElementById('nameSelect').value;
      const text = document.getElementById('ideaInput').value.trim();
      if(!name || !text) return showToast("Fill all fields!");

      ideas.push({ name, text, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
      renderIdeas();
      document.getElementById('ideaInput').value = "";
    };

    function renderIdeas() {
      const list = document.getElementById('ideasList');
      list.innerHTML = ideas.map((id, i) => `
        <li class="list-item">
          <div><strong>${id.name}</strong>: ${id.text} <br><small>${id.time}</small></div>
          <button class="delete-btn" onclick="removeIdea(${i})">✕</button>
        </li>`).join('');
      document.getElementById('ideaCount').textContent = ideas.length;
      document.getElementById('contribCount').textContent = new Set(ideas.map(i => i.name)).size;
    }
    window.removeIdea = (i) => { ideas.splice(i, 1); renderIdeas(); };

    // --- TIMER LOGIC (Simple) ---
    let timeLeft = 1500;
    let timer;
    document.getElementById('startTimerBtn').onclick = function() {
        if(timer) return;
        timer = setInterval(() => {
            if(timeLeft <= 0) { clearInterval(timer); showToast("Time is up!"); return; }
            timeLeft--;
            const m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timerDisplay').textContent = `${m}:${s<10?'0':''}${s}`;
        }, 1000);
    };
    document.getElementById('resetTimerBtn').onclick = () => { clearInterval(timer); timer=null; timeLeft=1500; document.getElementById('timerDisplay').textContent="25:00"; };

  </script>
</body>
</html>
